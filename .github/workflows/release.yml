# Release — build the image and deploy to lily via the shared reusable workflow
# (TheDevs-cz/ci). No more SSH-to-spare: the job calls `_ship.yml`, which
# builds+pushes ghcr.io/janmikes/wtips and then HMAC-POSTs
# https://deploy.lily.srv.thedevs.cz/hooks/wtips (per-app secret).
#
# Trigger: only after the `Tests` workflow succeeds on main (keeps the
# tests-must-pass gate the old SSH pipeline had).
#
# Secret (set on this repo): DEPLOY_WEBHOOK_SECRET (the per-app HMAC key, mirrored
# from the box /srv/webhook/secrets.env). Passed EXPLICITLY because the reusable
# workflow lives under a different owner (secrets: inherit can't cross owners).
#
# NOTE: the app id + image are `wtips` (not the repo name `tipovacka`); the
# legacy tipovacka.thedevs.cz instance is frozen and NOT auto-deployed.

name: Release

on:
    workflow_run:
        workflows: [Tests]
        types:
            - completed
        branches:
            - main

permissions:
    contents: read
    packages: write

jobs:
    ship-production:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        uses: TheDevs-cz/ci/.github/workflows/_ship.yml@v1
        secrets:
            DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        with:
            app: wtips
            image: ghcr.io/janmikes/wtips
            deploy_host: lily.srv.thedevs.cz
            build_args: APP_VERSION=${{ github.event.workflow_run.head_sha }}
            await_deploy: false
